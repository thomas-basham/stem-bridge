name: Release app

on:
  push:
    branches:
      - main

permissions:
  contents: write

concurrency:
  group: release-main
  cancel-in-progress: false

jobs:
  verify:
    name: Verify
    if: ${{ !startsWith(github.event.head_commit.message, 'ci(release):') }}
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

  bump-version:
    name: Bump version
    needs: verify
    if: ${{ !startsWith(github.event.head_commit.message, 'ci(release):') }}
    runs-on: ubuntu-latest

    outputs:
      version: ${{ steps.version.outputs.version }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Bump patch version
        id: version
        run: |
          npm version patch --no-git-tag-version
          VERSION="$(node -p "require('./package.json').version")"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Commit version bump
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add package.json package-lock.json
          git commit -m "ci(release): v$VERSION [skip ci]"
          git tag "v$VERSION"
          git push origin HEAD:main --follow-tags

  create-release:
    name: Create draft release
    needs: bump-version
    runs-on: ubuntu-latest

    steps:
      - name: Create draft GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          VERSION: ${{ needs.bump-version.outputs.version }}
        run: |
          if gh release view "v$VERSION" >/dev/null 2>&1; then
            echo "Release v$VERSION already exists"
          else
            gh release create "v$VERSION" --draft --title "v$VERSION" --generate-notes
          fi

  publish:
    name: Publish ${{ matrix.platform }}
    needs:
      - bump-version
      - create-release
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macOS
            os: macos-latest
          - platform: Windows
            os: windows-latest
          - platform: Linux
            os: ubuntu-latest

    steps:
      - name: Check out release tag
        uses: actions/checkout@v4
        with:
          ref: v${{ needs.bump-version.outputs.version }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Linux packaging tools
        if: ${{ runner.os == 'Linux' }}
        run: sudo apt-get update && sudo apt-get install -y rpm

      - name: Install dependencies
        run: npm ci

      - name: Publish app artifacts
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: npm run publish

  publish-release:
    name: Publish GitHub release
    needs:
      - bump-version
      - publish
    runs-on: ubuntu-latest

    steps:
      - name: Publish draft release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          VERSION: ${{ needs.bump-version.outputs.version }}
        run: gh release edit "v$VERSION" --draft=false
